# nginx/fleet-manager.conf — Nginx virtual host configuration for Fleet Manager
#
# This config:
#   1. Serves the React build (static files) from /var/www/fleet-manager/
#   2. Proxies all /api/* requests to the FastAPI backend running on port 8000
#   3. Enables gzip compression and standard security headers
#
# Installation:
#   sudo cp fleet-manager.conf /etc/nginx/sites-available/fleet-manager
#   sudo ln -s /etc/nginx/sites-available/fleet-manager /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace 'fleet.yourdomain.com' with your actual domain or subdomain.

server {
    listen 80;
    server_name fleet.yourdomain.com;  # ← Change this to your domain

    # ── Frontend (React build) ────────────────────────────────────────────────
    root /var/www/fleet-manager;       # ← Path to your `npm run build` output
    index index.html;

    # Gzip compression for faster page loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Serve React SPA — all non-file routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (JS/CSS bundles have content hashes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Backend API Proxy ─────────────────────────────────────────────────────
    # Forward /api/* requests to the Gunicorn/Uvicorn backend
    location /api/ {
        proxy_pass         http://127.0.0.1:7767;
        proxy_http_version 1.1;

        # WebSocket support (needed if you add real-time WS later)
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Pass real client info to the backend
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts (increase if backend queries are slow)
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/fleet-manager.access.log;
    error_log  /var/log/nginx/fleet-manager.error.log;
}

