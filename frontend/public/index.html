<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1976d2" />
    <meta name="description" content="Fleet Manager — Real-time vehicle tracking dashboard built with FastAPI, React, and Leaflet." />
    <meta name="keywords" content="fleet management, vehicle tracking, real-time map, FastAPI, React, Leaflet, GPS tracking" />

      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="

    />
