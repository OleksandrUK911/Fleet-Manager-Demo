# deploy/nginx-ssl.conf
#
# Nginx configuration for Fleet Manager Demo on a VPS with Let's Encrypt SSL.
# Domain : fleet-manager-demo.skakun-ml.com
#   /      → landing page  (website/dist)
#   /app/  → admin SPA     (frontend/build)
#   /api/  → FastAPI backend on port 7767
#
# Install:
#   sudo cp deploy/nginx-ssl.conf /etc/nginx/sites-available/fleet-manager
#   sudo ln -s /etc/nginx/sites-available/fleet-manager /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name fleet-manager-demo.skakun-ml.com www.fleet-manager-demo.skakun-ml.com;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — main server block ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fleet-manager-demo.skakun-ml.com www.fleet-manager-demo.skakun-ml.com;

    # ── SSL certificates (certbot / Let's Encrypt) ────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/fleet-manager-demo.skakun-ml.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fleet-manager-demo.skakun-ml.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── TLS hardening ─────────────────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/fleet-manager.access.log;
    error_log  /var/log/nginx/fleet-manager.error.log;

    # ── Landing page at / (website/dist) ──────────────────────────────────────
    root  /var/www/fleet-manager/website/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets cache ───────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Admin SPA at /app/ (frontend/build) ───────────────────────────────────
    location /app/ {
        alias /var/www/fleet-manager/frontend/build/;
        try_files $uri $uri/ /app/index.html;
    }

    location = /app/index.html {
        alias /var/www/fleet-manager/frontend/build/index.html;
        add_header Cache-Control "no-store";
    }

    # ── Backend API proxy ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:7767;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket upgrade support (/api/ws/positions)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
