<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08091a"/>
      <stop offset="100%" stop-color="#0d1230"/>
    </linearGradient>
    <!-- Blue glow -->
    <radialGradient id="glow1" cx="25%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#1976d2" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1976d2" stop-opacity="0"/>
    </radialGradient>
    <!-- Cyan glow -->
    <radialGradient id="glow2" cx="80%" cy="65%" r="45%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <!-- Card shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" fill-opacity="0.035"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Dot grid -->
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Glow blobs -->
  <ellipse cx="300" cy="250" rx="420" ry="320" fill="url(#glow1)"/>
  <ellipse cx="960" cy="410" rx="380" ry="280" fill="url(#glow2)"/>

  <!-- Top accent line -->
  <rect x="72" y="0" width="3" height="630" fill="url(#titleGrad)" opacity="0.6"/>

  <!-- Left panel: text -->
  <g transform="translate(108, 100)">
    <!-- Label -->
    <rect x="0" y="0" width="210" height="32" rx="16"
          fill="#1976d220" stroke="#1976d260" stroke-width="1"/>
    <text x="105" y="21" font-family="Inter, system-ui, sans-serif" font-size="13"
          font-weight="600" fill="#60a5fa" text-anchor="middle" letter-spacing="1.5">
      OPEN SOURCE DEMO
    </text>

    <!-- Main title -->
    <text y="88" font-family="'Plus Jakarta Sans', Inter, system-ui, sans-serif"
          font-size="62" font-weight="800" fill="url(#titleGrad)" letter-spacing="-1">
      Fleet Manager
    </text>
    <text y="152" font-family="'Plus Jakarta Sans', Inter, system-ui, sans-serif"
          font-size="62" font-weight="800" fill="#e2e8f0" letter-spacing="-1">
      Demo
    </text>

    <!-- Subtitle -->
    <text y="210" font-family="Inter, system-ui, sans-serif" font-size="22"
          font-weight="400" fill="#94a3b8" letter-spacing="0">
      Real-Time Vehicle Tracking Dashboard
    </text>

    <!-- Feature row -->
    <g transform="translate(0, 255)">
      <!-- Feature badge helper — using groups -->
      <rect x="0" y="0" width="148" height="34" rx="8" fill="#1e2d4a" stroke="#2563eb50" stroke-width="1"/>
      <text x="74" y="22" font-family="Inter, sans-serif" font-size="13" font-weight="600"
            fill="#60a5fa" text-anchor="middle">🗺 Live Map</text>

      <rect x="160" y="0" width="148" height="34" rx="8" fill="#1e2d4a" stroke="#2563eb50" stroke-width="1"/>
      <text x="234" y="22" font-family="Inter, sans-serif" font-size="13" font-weight="600"
            fill="#60a5fa" text-anchor="middle">⚡ WebSocket</text>

      <rect x="320" y="0" width="148" height="34" rx="8" fill="#1e2d4a" stroke="#2563eb50" stroke-width="1"/>
      <text x="394" y="22" font-family="Inter, sans-serif" font-size="13" font-weight="600"
            fill="#60a5fa" text-anchor="middle">🔒 JWT Auth</text>
    </g>

    <!-- Tech stack row -->
    <g transform="translate(0, 316)">
      <rect x="0" y="0" width="108" height="30" rx="6" fill="#0d2b1f" stroke="#059669" stroke-width="1"/>
      <text x="54" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="600"
            fill="#34d399" text-anchor="middle">FastAPI</text>

      <rect x="120" y="0" width="88" height="30" rx="6" fill="#172038" stroke="#3b82f6" stroke-width="1"/>
      <text x="164" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="600"
            fill="#60a5fa" text-anchor="middle">React 18</text>

      <rect x="220" y="0" width="100" height="30" rx="6" fill="#1c2a39" stroke="#0ea5e9" stroke-width="1"/>
      <text x="270" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="600"
            fill="#38bdf8" text-anchor="middle">Leaflet</text>

      <rect x="332" y="0" width="90" height="30" rx="6" fill="#2a1731" stroke="#a855f7" stroke-width="1"/>
      <text x="377" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="600"
            fill="#c084fc" text-anchor="middle">SQLite</text>
    </g>

    <!-- Stats row -->
    <g transform="translate(0, 382)">
      <!-- stat: 49 tests -->
      <text x="0" y="30" font-family="Inter, sans-serif" font-size="32" font-weight="800"
            fill="url(#titleGrad)">49</text>
      <text x="0" y="52" font-family="Inter, sans-serif" font-size="13" fill="#64748b">tests passing</text>

      <!-- stat: 5 vehicles -->
      <text x="100" y="30" font-family="Inter, sans-serif" font-size="32" font-weight="800"
            fill="url(#titleGrad)">5</text>
      <text x="100" y="52" font-family="Inter, sans-serif" font-size="13" fill="#64748b">live vehicles</text>

      <!-- stat: <1s -->
      <text x="200" y="30" font-family="Inter, sans-serif" font-size="32" font-weight="800"
            fill="url(#titleGrad)">&lt;1s</text>
      <text x="200" y="52" font-family="Inter, sans-serif" font-size="13" fill="#64748b">WS latency</text>

      <!-- stat: MIT -->
      <text x="310" y="30" font-family="Inter, sans-serif" font-size="32" font-weight="800"
            fill="url(#titleGrad)">MIT</text>
      <text x="310" y="52" font-family="Inter, sans-serif" font-size="13" fill="#64748b">open source</text>
    </g>
  </g>

  <!-- Right panel: mock dashboard card -->
  <g transform="translate(750, 80)" filter="url(#shadow)">
    <!-- Card body -->
    <rect x="0" y="0" width="380" height="460" rx="16"
          fill="#111827" stroke="#1e3a5f" stroke-width="1.5"/>

    <!-- Card header bar -->
    <rect x="0" y="0" width="380" height="48" rx="16" fill="#0f172a"/>
    <rect x="0" y="32" width="380" height="16" fill="#0f172a"/>

    <!-- Traffic lights -->
    <circle cx="20" cy="24" r="6" fill="#ef4444"/>
    <circle cx="40" cy="24" r="6" fill="#f59e0b"/>
    <circle cx="60" cy="24" r="6" fill="#22c55e"/>

    <!-- URL bar -->
    <rect x="80" y="14" width="220" height="20" rx="10" fill="#1e293b"/>
    <text x="190" y="28" font-family="Inter, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">
      fleet-manager-demo.vercel.app
    </text>

    <!-- KPI cards row -->
    <g transform="translate(12, 64)">
      <rect x="0"   y="0" width="78" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="39"  y="18" font-family="Inter, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">TOTAL</text>
      <text x="39"  y="38" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#e2e8f0" text-anchor="middle">5</text>

      <rect x="89"  y="0" width="78" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="128" y="18" font-family="Inter, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">ACTIVE</text>
      <text x="128" y="38" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#22c55e" text-anchor="middle">3</text>

      <rect x="178" y="0" width="78" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="217" y="18" font-family="Inter, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">IDLE</text>
      <text x="217" y="38" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#f59e0b" text-anchor="middle">1</text>

      <rect x="267" y="0" width="78" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <text x="306" y="18" font-family="Inter, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">MAINT.</text>
      <text x="306" y="38" font-family="Inter, sans-serif" font-size="20" font-weight="800" fill="#ef4444" text-anchor="middle">1</text>
    </g>

    <!-- Map placeholder -->
    <rect x="12" y="130" width="356" height="200" rx="8" fill="#0c1220" stroke="#1e3a5f" stroke-width="1"/>
    <!-- Map grid lines -->
    <line x1="12" y1="196" x2="368" y2="196" stroke="#1e3a5f" stroke-width="0.5"/>
    <line x1="12" y1="262" x2="368" y2="262" stroke="#1e3a5f" stroke-width="0.5"/>
    <line x1="100" y1="130" x2="100" y2="330" stroke="#1e3a5f" stroke-width="0.5"/>
    <line x1="190" y1="130" x2="190" y2="330" stroke="#1e3a5f" stroke-width="0.5"/>
    <line x1="280" y1="130" x2="280" y2="330" stroke="#1e3a5f" stroke-width="0.5"/>
    <!-- Route line -->
    <polyline points="60,290 90,260 130,240 175,220 220,215 265,222 295,240 325,258"
              fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2" opacity="0.7"/>
    <!-- Speed heatmap segment overlay -->
    <polyline points="60,290 90,260" fill="none" stroke="#22c55e" stroke-width="3" opacity="0.8"/>
    <polyline points="90,260 130,240 175,220" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.8"/>
    <polyline points="175,220 220,215 265,222 295,240" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.8"/>
    <polyline points="295,240 325,258" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.8"/>
    <!-- Vehicle markers -->
    <circle cx="295" cy="240" r="8" fill="#1976d2" stroke="#60a5fa" stroke-width="2"/>
    <text x="295" y="245" font-size="8" text-anchor="middle" fill="white">🚛</text>
    <circle cx="175" cy="220" r="7" fill="#22c55e" stroke="#4ade80" stroke-width="1.5"/>
    <text x="175" y="224" font-size="8" text-anchor="middle" fill="white">🚗</text>
    <circle cx="130" cy="280" r="7" fill="#22c55e" stroke="#4ade80" stroke-width="1.5"/>
    <text x="130" y="284" font-size="8" text-anchor="middle" fill="white">🚐</text>
    <!-- Geofence zone -->
    <circle cx="220" cy="180" r="30" fill="none" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>

    <!-- Speed chart below map -->
    <g transform="translate(12, 342)">
      <text x="0" y="14" font-family="Inter, sans-serif" font-size="9" fill="#64748b">SPEED (km/h)</text>
      <!-- Chart bars -->
      <rect x="0" y="20"  width="18" height="20" rx="2" fill="#22c55e" opacity="0.7"/>
      <rect x="22" y="16" width="18" height="24" rx="2" fill="#22c55e" opacity="0.7"/>
      <rect x="44" y="12" width="18" height="28" rx="2" fill="#f59e0b" opacity="0.7"/>
      <rect x="66" y="8"  width="18" height="32" rx="2" fill="#f59e0b" opacity="0.7"/>
      <rect x="88" y="5"  width="18" height="35" rx="2" fill="#ef4444" opacity="0.7"/>
      <rect x="110" y="10" width="18" height="30" rx="2" fill="#f59e0b" opacity="0.7"/>
      <rect x="132" y="18" width="18" height="22" rx="2" fill="#22c55e" opacity="0.7"/>
      <rect x="154" y="24" width="18" height="16" rx="2" fill="#22c55e" opacity="0.7"/>
      <rect x="176" y="20" width="18" height="20" rx="2" fill="#22c55e" opacity="0.7"/>
      <rect x="198" y="14" width="18" height="26" rx="2" fill="#f59e0b" opacity="0.7"/>
    </g>
  </g>

  <!-- Bottom URL bar -->
  <g transform="translate(108, 558)">
    <text font-family="Inter, sans-serif" font-size="15" fill="#475569">
      github.com/Fleet-Manager-Demo/fleet-manager-demo
    </text>
  </g>
</svg>
