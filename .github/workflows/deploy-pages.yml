# .github/workflows/deploy-pages.yml
#
# Deploys the promo landing page (website/) to GitHub Pages automatically
# on every push to main. No server required — fully static hosting.
#
# After first run the site will be live at:
#   https://oleksandruk911.github.io/Fleet-Manager-Demo/
#
# To enable:
#   GitHub repo → Settings → Pages → Source: "GitHub Actions"

name: Deploy Landing to GitHub Pages

on:
  push:
    branches: [main]

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build promo site (Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Vite site
        env:
          # Base path MUST match the repo name for GitHub Pages project sites
          VITE_BASE: /Fleet-Manager-Demo/
          # Optional: point "Live Demo" button to your Railway deployment
          # Set this in: GitHub repo → Settings → Variables → Actions → VITE_DEMO_URL
          VITE_DEMO_URL: ${{ vars.VITE_DEMO_URL || 'https://fleet-manager-demo-production.up.railway.app/app' }}
          VITE_GITHUB_URL: https://github.com/OleksandrUK911/Fleet-Manager-Demo
          VITE_SWAGGER_URL: ${{ vars.VITE_SWAGGER_URL || 'https://fleet-manager-demo-production.up.railway.app/api/docs' }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
