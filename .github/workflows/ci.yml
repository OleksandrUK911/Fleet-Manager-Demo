# .github/workflows/ci.yml
# Fleet Manager CI — runs on every push and pull request to main/master.
#
# Jobs:
#   backend  — Python 3.13: install deps → flake8 lint → pytest (62 tests)
#   frontend — Node 20: npm ci → npm run build (catches any JS/JSX errors)
#   website  — Node 20: npm ci → eslint → npm run build (promo site in website/)

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Python backend ────────────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .   # pytest.ini at repo root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Install dev/lint tools
        run: pip install flake8

      - name: Lint — flake8
        # E501 = line too long (handled by editor config)
        # W503 = line break before binary operator (Black style)
        # E221 = multiple spaces before operator (alignment, intentional)
        # E201 = whitespace after '(' (Black/alignment style)
        # E202 = whitespace before ')' (Black/alignment style)
        run: |
          flake8 backend/app/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503,E402,E221,E201,E202 \
            --exclude=__pycache__,migrations

      - name: Run pytest
        env:
          DATABASE_URL: sqlite:///./ci_test.db
          JWT_SECRET_KEY: ci-test-secret-key-only-for-tests
        run: python -m pytest backend/tests/ -v --tb=short

  # ── React frontend ────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (production bundle)
        # CI=false prevents CRA from treating warnings as errors
        env:
          CI: false
        run: npm run build

  # ── Promo website ─────────────────────────────────────────────────────────
  website:
    name: Website (Node 20 · Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint — warnings allowed)
        run: npx eslint src --ext .js,.jsx --max-warnings 20 || true

      - name: Build promo site (Vite)
        run: npm run build
