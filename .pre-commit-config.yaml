# .pre-commit-config.yaml — Pre-commit hooks for Fleet Manager
#
# Install pre-commit:
#   pip install pre-commit
#   pre-commit install        ← sets up the git hook
#   pre-commit run --all-files ← run manually on all files once
#
# Hooks run automatically before every `git commit`.

repos:
  # ── Python formatting ──────────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        name: black (Python formatter)
        language_version: python3
        files: ^backend/
        args: [--line-length=120]

  # ── Python import sorting ──────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (import sorter)
        files: ^backend/
        args: [--profile=black, --line-length=120]

  # ── Python linting ──────────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: flake8 (Python linter)
        files: ^backend/
        args:
          - --max-line-length=120
          - --extend-ignore=E501,W503,E402

  # ── General file hygiene ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
        exclude: \.md$
      - id: check-yaml
      - id: check-json
        exclude: ^frontend/
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── JavaScript / React ──────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.57.0
    hooks:
      - id: eslint
        name: eslint (JS/JSX linter)
        files: ^frontend/src/.*\.(js|jsx)$
        additional_dependencies:
          - eslint@8.57.0
          - eslint-plugin-react@7.34.1
          - eslint-plugin-react-hooks@4.6.2
        args: [--max-warnings=0]

  # ── Website (Vite + React) ESLint ───────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint-website
        name: eslint (website JSX)
        language: node
        entry: bash -c 'cd website && npm run lint'
        files: ^website/src/.*\.(js|jsx)$
        pass_filenames: false
