# nixpacks.toml — Nixpacks build configuration for Railway
# Ensures both Node.js 20 and Python 3.12 are available during build.

[phases.setup]
nixPkgs = ["nodejs_20", "python312", "python312Packages.pip"]

[phases.install]
cmds = [
  "pip install -r backend/requirements.txt",
]

[start]
cmd = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1"
