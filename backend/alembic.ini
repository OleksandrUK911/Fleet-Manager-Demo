# alembic.ini — Alembic configuration for Fleet Manager
#
# Run migrations from the /backend directory:
#   cd backend
#   alembic upgrade head          — apply all pending migrations
#   alembic revision --autogenerate -m "describe change"  — generate new migration
#   alembic downgrade -1          — roll back one step

[alembic]
# Path to migration scripts, relative to this file (backend/)
script_location = alembic

# File naming for new revision files
file_template = %%(rev)s_%%(slug)s

# Default: SQLite local dev DB (overridden at runtime via DATABASE_URL env var)
# env.py reads DATABASE_URL from .env so this line is mostly a fallback comment.
sqlalchemy.url = sqlite:///./fleet.db

# Encode new migration files as UTF-8
output_encoding = utf-8

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
